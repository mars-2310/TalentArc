name: CD Dev Pipeline

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-dev:
    name: Build & Publish Dev Container Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository name for GHCR
        run: |
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Dev image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:dev
            ghcr.io/${{ env.REPO_LOWER }}/backend:dev-${{ github.sha }}

      - name: Build and push Frontend Dev image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:dev
            ghcr.io/${{ env.REPO_LOWER }}/frontend:dev-${{ github.sha }}
